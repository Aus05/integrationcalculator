<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Definite Integral Calculator</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/11.8.0/math.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #3498db;
            --bg-color: #f8f9fa;
            --panel-bg: #ffffff;
            --text-color: #333;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            display: flex;
            flex-direction: row;
            gap: 20px;
            max-width: 1200px;
            width: 100%;
            background: var(--panel-bg);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .control-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 20px;
            min-width: 320px;
        }

        .graph-panel {
            flex: 2;
            position: relative;
            min-height: 450px;
            background: #fff;
            border: 1px solid #e1e4e6;
            border-radius: 8px;
            padding: 10px;
        }

        h2 {
            margin-top: 0;
            color: var(--primary-color);
            border-bottom: 2px solid #eaeded;
            padding-bottom: 10px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        label {
            font-weight: 600;
            font-size: 0.9rem;
            color: #566573;
        }

        input[type="text"], input[type="number"] {
            padding: 12px;
            border: 2px solid #d5dbdb;
            border-radius: 6px;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }

        input[type="text"]:focus, input[type="number"]:focus {
            border-color: var(--accent-color);
        }

        .slider-container {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        input[type="range"] {
            flex: 1;
            accent-color: var(--accent-color);
        }

        .bounds-inputs {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .result-box {
            background-color: #ebf5fb;
            border-left: 5px solid var(--accent-color);
            padding: 15px;
            border-radius: 4px;
            margin-top: 10px;
        }

        .result-title {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #2980b9;
            margin-bottom: 5px;
            font-weight: bold;
        }

        .result-value {
            font-size: 1.6rem;
            font-weight: bold;
            color: var(--primary-color);
            font-family: 'Courier New', Courier, monospace;
        }

        .error-msg {
            color: #e74c3c;
            font-size: 0.85rem;
            min-height: 18px;
            font-weight: 500;
        }

        @media (max-width: 850px) {
            .container {
                flex-direction: column;
            }
            .graph-panel {
                min-height: 350px;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="control-panel">
        <h2>Integration Calculator</h2>
        
        <div class="input-group">
            <label for="function-input">Define Function f(x):</label>
            <input type="text" id="function-input" value="x^2 - 1" placeholder="e.g., x^2 - 1, sin(x), etc.">
            <div id="error-output" class="error-msg"></div>
        </div>

        <div class="input-group">
            <div class="bounds-inputs">
                <div>
                    <label for="bound-a">Lower Bound (a):</label>
                    <input type="number" id="bound-a" value="0" step="0.1">
                </div>
                <div>
                    <label for="slider-a">Fine Tune (a):</label>
                    <div class="slider-container" style="margin-top: 12px;">
                        <input type="range" id="slider-a" min="-10" max="10" step="0.05" value="0">
                    </div>
                </div>
            </div>
        </div>

        <div class="input-group">
            <div class="bounds-inputs">
                <div>
                    <label for="bound-b">Upper Bound (b):</label>
                    <input type="number" id="bound-b" value="2" step="0.1">
                </div>
                <div>
                    <label for="slider-b">Fine Tune (b):</label>
                    <div class="slider-container" style="margin-top: 12px;">
                        <input type="range" id="slider-b" min="-10" max="10" step="0.05" value="2">
                    </div>
                </div>
            </div>
        </div>

        <div class="result-box">
            <div class="result-title">Definite Integral Value ∫ f(x) dx</div>
            <div id="result-display" class="result-value">0.6667</div>
        </div>
    </div>

    <div class="graph-panel">
        <canvas id="graphCanvas"></canvas>
    </div>
</div>

<script>
    // Global variable pointers
    const fxInput = document.getElementById('function-input');
    const boundAInput = document.getElementById('bound-a');
    const boundBInput = document.getElementById('bound-b');
    const sliderA = document.getElementById('slider-a');
    const sliderB = document.getElementById('slider-b');
    const resultDisplay = document.getElementById('result-display');
    const errorOutput = document.getElementById('error-output');
    const ctx = document.getElementById('graphCanvas').getContext('2d');

    let chart;

    // Numerical integration using Simpson's Rule for highly precise computations
    function simpsonsRule(f, a, b, n = 1000) {
        if (a === b) return 0;
        if (n % 2 !== 0) n++; // Simpson's rule requires an even number of intervals
        
        const h = (b - a) / n;
        let sum = f(a) + f(b);
        
        for (let i = 1; i < n; i++) {
            const x = a + i * h;
            sum += (i % 2 === 0 ? 2 : 4) * f(x);
        }
        
        return (h / 3) * sum;
    }

    // Safely evaluate parsed math string configurations
    function getMathFunction(exprString) {
        try {
            const compiledExpr = math.compile(exprString);
            // Test execution capability safely
            compiledExpr.evaluate({ x: 1 });
            errorOutput.innerText = ""; // Clear errors if it passes
            return (xValue) => compiledExpr.evaluate({ x: xValue });
        } catch (err) {
            errorOutput.innerText = "Invalid math expression syntax.";
            return null;
        }
    }

    function calculateAndPlot() {
        const exprText = fxInput.value;
        const a = parseFloat(boundAInput.value);
        const b = parseFloat(boundBInput.value);

        const f = getMathFunction(exprText);
        if (!f) return; // Halt updating visual metrics if the expression breaks parsing

        // 1. Calculate Definite Integral
        const integralValue = simpsonsRule(f, a, b);
        resultDisplay.innerText = Number(integralValue.toFixed(5)).toString();

        // 2. Build datasets for Charting Graph
        const xValues = [];
        const yValues = [];
        const shadedAreaValues = [];

        // Dynamic view range calculation around bounds
        const minRange = Math.min(a, b, -5) - 2;
        const maxRange = Math.max(a, b, 5) + 2;
        const step = (maxRange - minRange) / 200;

        for (let x = minRange; x <= maxRange; x += step) {
            let y = 0;
            try {
                y = f(x);
            } catch(e) { y = NaN; }

            xValues.push(Number(x.toFixed(3)));
            yValues.push(y);

            // Shading conditions between active boundaries 'a' and 'b'
            const lower = Math.min(a, b);
            const upper = Math.max(a, b);
            if (x >= lower && x <= upper) {
                shadedAreaValues.push({ x: Number(x.toFixed(3)), y: y });
            }
        }

        // 3. Update or Instantiate Chart.js layout structure
        if (chart) {
            chart.data.labels = xValues;
            chart.data.datasets[0].data = yValues;
            chart.data.datasets[1].data = shadedAreaValues;
            chart.update('none'); // Update smoothly without full animation stutter
        } else {
            chart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: xValues,
                    datasets: [
                        {
                            label: 'f(x)',
                            data: yValues,
                            borderColor: '#2c3e50',
                            borderWidth: 3,
                            pointRadius: 0,
                            fill: false,
                            order: 1
                        },
                        {
                            label: 'Area Under Curve',
                            data: shadedAreaValues,
                            backgroundColor: 'rgba(52, 152, 219, 0.35)',
                            borderColor: 'transparent',
                            pointRadius: 0,
                            fill: 'origin', // Colors down directly to standard x-axis line
                            order: 2
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        x: {
                            type: 'linear',
                            position: 'center',
                            grid: { color: '#e4e7ea' }
                        },
                        y: {
                            type: 'linear',
                            position: 'center',
                            grid: { color: '#e4e7ea' }
                        }
                    },
                    plugins: {
                        legend: { display: false }
                    }
                }
            });
        }
    }

    // Bidirectional syncing listeners for handling textual input boxes tied directly with sliders
    function syncInputs(source, target) {
        target.value = source.value;
        calculateAndPlot();
    }

    boundAInput.addEventListener('input', () => syncInputs(boundAInput, sliderA));
    sliderA.addEventListener('input', () => syncInputs(sliderA, boundAInput));

    boundBInput.addEventListener('input', () => syncInputs(boundBInput, sliderB));
    sliderB.addEventListener('input', () => syncInputs(sliderB, boundBInput));

    fxInput.addEventListener('input', calculateAndPlot);

    // Initial load orchestration
    calculateAndPlot();
</script>

</body>
</html>
